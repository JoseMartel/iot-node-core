<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Node Core | Config</title>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --accent: #38bdf8; --success: #10b981; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; }
        header { text-align: center; margin-bottom: 30px; }
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid #334155; }
        .card-title { font-size: 12px; color: #94a3b8; text-transform: uppercase; }
        .card-value { font-size: 20px; font-weight: bold; margin-top: 5px; }
        .settings { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid #334155; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .btn-restart { background: #475569; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>IoT Node Generic</h1><p>Configuración y Estado</p></header>
        <div class="dashboard">
            <div class="card"><div class="card-title">Heap</div><div id="heap" class="card-value">-- KB</div></div>
            <div class="card"><div class="card-title">NVS Buffer</div><div id="pending" class="card-value">-- / 1024</div></div>
        </div>
        <div class="settings">
            <div class="form-group"><label>WiFi SSID</label><input type="text" id="ssid"></div>
            <div class="form-group"><label>WiFi Password</label><input type="password" id="pass"></div>
            <div class="form-group"><label>Lectura (s)</label><input type="number" id="read_int"></div>
            <div class="form-group"><label>Reporte (s)</label><input type="number" id="send_int"></div>
            <button onclick="saveSettings()">Guardar Configuración</button>
            <p id="msg" style="text-align: center; font-size: 13px;"></p>
        </div>
    </div>
    <script>
        async function load() {
            const res = await fetch('/api/status');
            const data = await res.json();
            document.getElementById('heap').textContent = (data.heap/1024).toFixed(1) + ' KB';
            document.getElementById('pending').textContent = data.pending + ' / 1024';
            
            const configRes = await fetch('/api/config');
            const config = await configRes.json();
            document.getElementById('ssid').value = config.ssid || '';
            document.getElementById('read_int').value = config.read_int;
            document.getElementById('send_int').value = config.send_int;
        }
        async function saveSettings() {
            const payload = {
                ssid: document.getElementById('ssid').value,
                pass: document.getElementById('pass').value,
                read_int: parseInt(document.getElementById('read_int').value),
                send_int: parseInt(document.getElementById('send_int').value)
            };
            const res = await fetch('/api/config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            document.getElementById('msg').textContent = res.ok ? 'Guardado. Reinicie para aplicar red.' : 'Error';
        }
        load();
        setInterval(load, 5000);
    </script>
</body>
</html>
